mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: debug
unified-delay: false
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: '127.0.0.1:9090'
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  mtu: 9000
  strict-route: true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  listen: :53
  ipv6: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ["*", "+.lan", "+.local"]
  nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  proxy-server-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  nameserver-policy:
    "geosite_cn,geoip_cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite_!cn":
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query

proxies:
  - {name: 🇭🇰 vless, type: vless, server: ns.cloudflare.com, port: 443, uuid: ea853e6f-4f3d-4ab2-b621-a9dd8c478101, tls: true, udp: false, skip-cert-verify: true, servername: vless.shifeng.fun, network: ws, ws-opts: {path: "/?ed=2048", headers: {Host: vless.shifeng.fun}}}
  - {name: 🇭🇰 trojan, type: trojan, server: ns.cloudflare.com, port: 443, password: 17715748077, tls: true, udp: false, sni: trojan.shifeng.fun, skip-cert-verify: true, network: ws, ws-opts: {path: "/", headers: {Host: trojan.shifeng.fun}}}
  - {name: 🇰🇷 韩国 1, type: vless, server: ns.cloudflare.com, port: 443, uuid: ea853e6f-4f3d-4ab2-b621-a9dd8c478101, tls: true, udp: false, skip-cert-verify: true, servername: vless-kr.shifeng.fun, network: ws, ws-opts: {path: "/?ed=2048", headers: {Host: vless-kr.shifeng.fun}}}
  - {name: 🇰🇷 韩国 2, type: trojan, server: ns.cloudflare.com, port: 443, password: 17715748077, tls: true, udp: false, sni: trojan-kr.shifeng.fun, skip-cert-verify: true, network: ws, ws-opts: {path: "/", headers: {Host: trojan-kr.shifeng.fun}}}
  - {name: 🇺🇸 美国 1, type: vless, server: ns.cloudflare.com, port: 443, uuid: ea853e6f-4f3d-4ab2-b621-a9dd8c478101, tls: true, udp: false, skip-cert-verify: true, servername: vless-us.shifeng.fun, network: ws, ws-opts: {path: "/?ed=2048", headers: {Host: vless-us.shifeng.fun}}}
  - {name: 🇺🇸 美国 2, type: trojan, server: ns.cloudflare.com, port: 443, password: 17715748077, tls: true, udp: false, sni: trojan-us.shifeng.fun, skip-cert-verify: true, network: ws, ws-opts: {path: "/", headers: {Host: trojan-us.shifeng.fun}}}

proxy-groups:
  - {name: proxy, type: select, proxies: [auto], include-all: true}
  - {name: auto, type: url-test, include-all: true, exclude-filter: direct, url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50}

rules:
  - PROCESS-NAME,rtrojan-usdesk.exe,direct
  - DOMAIN-SUFFIX,googleapis.cn,proxy
  - RULE-SET,geosite_category-ads-all,REJECT
  - RULE-SET,geosite_cn,direct
  - RULE-SET,geoip_cn,direct
  - RULE-SET,geosite_!cn,proxy
  - MATCH,proxy

rule-providers:
  geosite_cn:
    type: http
    behavior: domain
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    format: mrs
  geoip_cn:
    type: http
    behavior: ipcidr
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    format: mrs
  geosite_!cn:
    type: http
    behavior: domain
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"
    format: mrs
  geosite_category-ads-all:
    type: http
    behavior: domain
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"
    format: mrs
