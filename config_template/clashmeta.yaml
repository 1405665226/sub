proxy-providers:
  xsus:
    url: "https://xsus.men/api/v1/client/subscribe?token=9a1e358c142052488573581253f0ff48"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  worker:
    url: "https://raw.githubusercontent.com/1405665226/sub/refs/heads/main/cf-workers/clashmeta.yaml"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: debug
unified-delay: false
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: '127.0.0.1:9090'
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  mtu: 9000
  strict-route: true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  listen: :53
  ipv6: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ["*", "+.lan", "+.local"]
  nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  proxy-server-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  nameserver-policy:
    "geosite_cn,geoip_cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite_!cn":
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query

proxies:
  - {name: direct, type: direct, udp: true}

