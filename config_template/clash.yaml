proxy-providers:
  xsus:
    url: "https://xsus.men/api/v1/client/subscribe?token=3c97042cba204785efaf66a216450085"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: debug
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: '127.0.0.1:9090'
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  mtu: 9000
  strict-route: true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  listen: :53
  ipv6: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ["*", "+.lan", "+.local"]
  nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  proxy-server-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  nameserver-policy:
    "geosite_cn,geoip_cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite_!cn":
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query

proxies:
  - {name: direct, type: direct, udp: true}
  - {name: vless, type: vless, server: 162.159.249.114, port: 443, uuid: 5a2afab1-d8b8-4426-b60d-02d0ccf9a0a9, tls: true, udp: false, skip-cert-verify: false, servername: vless.shifeng.fun, network: ws, ws-opts: {path: "/?ed=2048", headers: {Host: vless.shifeng.fun}}}
  - {name: trojan, type: trojan, server: 162.159.249.114, port: 443, password: 17715748077, tls: true, udp: false, sni: trojan.shifeng.fun, skip-cert-verify: false, network: ws, ws-opts: {path: "/", headers: {Host: trojan.shifeng.fun}}}

proxy-groups:
  - {name: proxy, type: select, proxies: [auto, 香港, 日本, 台湾, 美国, 新加坡], include-all: true}
  - {name: auto, type: url-test, include-all: true, exclude-filter: direct, url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50}
  - {name: 香港, type: url-test, filter: "(?i)港|hk|hongkong", include-all: true, exclude-filter: direct, url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50}
  - {name: 日本, type: url-test, filter: "(?i)日|jp|japan", include-all: true, exclude-filter: direct, url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50}
  - {name: 台湾, type: url-test, filter: "(?i)台|tw|taiwan", include-all: true, exclude-filter: direct, url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50}
  - {name: 美国, type: url-test, filter: "(?i)美|us|united states", include-all: true, exclude-filter: direct, url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50}
  - {name: 新加坡, type: url-test, filter: "(?i)(新|狮|sg|singapore)", include-all: true, exclude-filter: direct, url: https://www.gstatic.com/generate_204, interval: 300, tolerance: 50}

rules:
  - PROCESS-NAME,rustdesk.exe,direct
  - DOMAIN-SUFFIX,googleapis.cn,proxy
  - RULE-SET,geosite_category-ads-all,REJECT
  - RULE-SET,geosite_cn,direct
  - RULE-SET,geoip_cn,direct
  - RULE-SET,geosite_!cn,proxy
  - MATCH,proxy

rule-providers:
  geosite_cn:
    type: http
    behavior: domain
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    format: mrs
  geoip_cn:
    type: http
    behavior: ipcidr
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    format: mrs
  geosite_!cn:
    type: http
    behavior: domain
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"
    format: mrs
  geosite_category-ads-all:
    type: http
    behavior: domain
    interval: 86400
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"
    format: mrs
